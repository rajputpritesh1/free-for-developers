<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Micro SaaS — No Backend Required</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f5f0e8;
  --ink:#0f0e0a;
  --paper:#fffdf7;
  --rule:#d4cdb8;
  --accent:#e8380d;
  --accent2:#1a6b3c;
  --accent3:#1b4fd8;
  --muted:#7a7264;
  --tag-bg:#0f0e0a;
  --tag-text:#f5f0e8;
}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Manrope',sans-serif;
  min-height:100vh;
  position:relative;
}

/* Newspaper texture overlay */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 24px,rgba(0,0,0,0.04) 24px,rgba(0,0,0,0.04) 25px);
  pointer-events:none;
  z-index:0;
}

/* Halftone dot pattern */
body::before{
  content:'';
  position:fixed;
  top:0;right:0;
  width:300px;height:300px;
  background-image:radial-gradient(circle,rgba(232,56,13,0.12) 1px,transparent 1px);
  background-size:12px 12px;
  pointer-events:none;
  z-index:0;
}

.page{
  max-width:1300px;
  margin:0 auto;
  padding:0 32px 80px;
  position:relative;
  z-index:1;
}

/* MASTHEAD */
.masthead{
  border-bottom:4px double var(--ink);
  padding:40px 0 24px;
  margin-bottom:0;
}

.masthead-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  margin-bottom:12px;
}

.byline{
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:var(--muted);
  letter-spacing:0.1em;
  text-transform:uppercase;
}

.issue-meta{
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:var(--muted);
  text-align:right;
}

.paper-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(60px,10vw,120px);
  line-height:0.9;
  letter-spacing:0.02em;
  color:var(--ink);
  text-align:center;
  margin:8px 0;
}

.paper-title span{color:var(--accent);}

.deck{
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:var(--muted);
  text-align:center;
  letter-spacing:0.08em;
  text-transform:uppercase;
  border-top:1px solid var(--rule);
  border-bottom:1px solid var(--rule);
  padding:8px 0;
  margin-top:12px;
}

/* TOOLBAR */
.toolbar{
  display:flex;
  gap:0;
  margin:24px 0 0;
  border:1.5px solid var(--ink);
  overflow:hidden;
  flex-wrap:wrap;
}

.filter-btn{
  background:var(--paper);
  border:none;
  border-right:1.5px solid var(--ink);
  color:var(--muted);
  font-family:'Space Mono',monospace;
  font-size:10px;
  padding:8px 16px;
  cursor:pointer;
  letter-spacing:0.08em;
  text-transform:uppercase;
  transition:all 0.15s;
  flex:1;
  min-width:90px;
}

.filter-btn:last-child{border-right:none;}
.filter-btn:hover{background:var(--ink);color:var(--bg);}
.filter-btn.active{background:var(--accent);color:#fff;font-weight:700;}

/* STATS ROW */
.stats-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border:1.5px solid var(--ink);
  border-top:none;
  margin-bottom:32px;
}

.stat-box{
  padding:16px 20px;
  border-right:1.5px solid var(--ink);
  background:var(--paper);
}

.stat-box:last-child{border-right:none;}

.stat-n{
  font-family:'Bebas Neue',sans-serif;
  font-size:42px;
  line-height:1;
  color:var(--accent);
}

.stat-l{
  font-family:'Space Mono',monospace;
  font-size:9px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.1em;
  margin-top:2px;
}

/* SEARCH */
.search-row{
  margin-bottom:28px;
  display:flex;
  gap:0;
}

.search-input{
  flex:1;
  border:1.5px solid var(--ink);
  background:var(--paper);
  font-family:'Space Mono',monospace;
  font-size:12px;
  padding:10px 16px;
  color:var(--ink);
  outline:none;
}

.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--accent);}

.search-label{
  background:var(--ink);
  color:var(--bg);
  font-family:'Space Mono',monospace;
  font-size:10px;
  padding:10px 16px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  display:flex;
  align-items:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:0;
  border:1.5px solid var(--ink);
  background:var(--ink);
}

.card{
  background:var(--paper);
  padding:22px 24px;
  border:0;
  outline:1px solid var(--ink);
  cursor:pointer;
  transition:background 0.15s;
  position:relative;
  animation:fadeIn 0.3s ease both;
}

.card:hover{background:var(--bg);}

.card-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:12px;
}

.card-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;
  line-height:1;
  color:var(--rule);
}

.card-tag{
  font-family:'Space Mono',monospace;
  font-size:9px;
  padding:3px 8px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  font-weight:700;
}

.t-productivity{background:#1b4fd8;color:#fff;}
.t-utility{background:#1a6b3c;color:#fff;}
.t-developer{background:#0f0e0a;color:#f5f0e8;}
.t-content{background:#e8380d;color:#fff;}
.t-finance{background:#7a3800;color:#fff;}
.t-hr{background:#5a1a6b;color:#fff;}
.t-education{background:#0a5a6b;color:#fff;}
.t-health{background:#6b1a2a;color:#fff;}

.card-title{
  font-size:15px;
  font-weight:800;
  color:var(--ink);
  margin-bottom:6px;
  line-height:1.3;
  letter-spacing:-0.01em;
}

.card-desc{
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
  margin-bottom:14px;
  font-family:'Space Mono',monospace;
}

.card-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding-top:12px;
  border-top:1px solid var(--rule);
}

.card-price{
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;
  color:var(--accent2);
  letter-spacing:0.05em;
}

.card-effort{
  font-family:'Space Mono',monospace;
  font-size:9px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.08em;
}

/* MODAL */
.overlay{
  position:fixed;inset:0;
  background:rgba(15,14,10,0.92);
  z-index:200;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
  opacity:0;pointer-events:none;
  transition:opacity 0.2s;
}

.overlay.open{opacity:1;pointer-events:all;}

.modal{
  background:var(--paper);
  border:2px solid var(--ink);
  max-width:600px;
  width:100%;
  max-height:90vh;
  overflow-y:auto;
  position:relative;
  transform:scale(0.96);
  transition:transform 0.2s;
}

.overlay.open .modal{transform:scale(1);}

.modal-banner{
  background:var(--ink);
  color:var(--bg);
  padding:20px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.modal-banner-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:48px;
  line-height:1;
  color:var(--accent);
}

.modal-banner-right{
  text-align:right;
}

.modal-close{
  background:var(--accent);
  border:none;
  color:#fff;
  font-family:'Space Mono',monospace;
  font-size:10px;
  padding:6px 14px;
  cursor:pointer;
  letter-spacing:0.1em;
  text-transform:uppercase;
  margin-bottom:8px;
  display:block;
  margin-left:auto;
}

.modal-close:hover{background:#c4290b;}

.modal-body{padding:28px;}

.modal-tag-line{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.modal-title{
  font-size:24px;
  font-weight:800;
  letter-spacing:-0.02em;
  margin-bottom:4px;
}

.modal-desc{
  font-family:'Space Mono',monospace;
  font-size:12px;
  color:var(--muted);
  line-height:1.7;
  margin-bottom:20px;
}

.modal-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:var(--ink);
  border:1.5px solid var(--ink);
  margin-bottom:20px;
}

.modal-kv{
  background:var(--bg);
  padding:12px 14px;
}

.modal-kv-l{
  font-family:'Space Mono',monospace;
  font-size:9px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.1em;
  margin-bottom:3px;
}

.modal-kv-v{
  font-size:13px;
  font-weight:700;
  color:var(--ink);
}

.modal-kv-v.red{color:var(--accent);}
.modal-kv-v.green{color:var(--accent2);}
.modal-kv-v.blue{color:var(--accent3);}

.modal-section-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;
  letter-spacing:0.05em;
  color:var(--ink);
  border-bottom:2px solid var(--ink);
  padding-bottom:4px;
  margin-bottom:10px;
}

.feature-list{
  list-style:none;
  margin-bottom:20px;
}

.feature-list li{
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:var(--muted);
  padding:5px 0;
  border-bottom:1px solid var(--rule);
  display:flex;gap:8px;align-items:flex-start;
}

.feature-list li::before{content:'▸';color:var(--accent);flex-shrink:0;}

.pain-box{
  background:var(--ink);
  color:var(--bg);
  padding:14px 16px;
  font-family:'Space Mono',monospace;
  font-size:11px;
  line-height:1.7;
  margin-bottom:20px;
}

.pain-box strong{color:var(--accent);font-weight:400;}

.tech-row{
  display:flex;gap:6px;flex-wrap:wrap;
}

.tech-badge{
  font-family:'Space Mono',monospace;
  font-size:10px;
  background:var(--bg);
  border:1px solid var(--rule);
  padding:3px 10px;
  color:var(--muted);
}

/* NO RESULTS */
.no-results{
  grid-column:1/-1;
  text-align:center;
  padding:80px 20px;
  background:var(--paper);
}

.no-results-big{
  font-family:'Bebas Neue',sans-serif;
  font-size:80px;
  color:var(--rule);
  line-height:1;
}

.no-results-sub{
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:var(--muted);
  margin-top:8px;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:640px){
  .paper-title{font-size:52px;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .toolbar{overflow-x:auto;}
  .filter-btn{min-width:80px;font-size:9px;padding:8px 10px;}
  .modal-grid{grid-template-columns:1fr;}
}
</style>
</head>

</div>

const tagClass = {
  productivity:"t-productivity",
  utility:"t-utility",
  developer:"t-developer",
  content:"t-content",
  finance:"t-finance",
  hr:"t-hr",
  education:"t-education",
  health:"t-health"
};

let currentFilter = 'all';
let currentSearch = '';

function getVisible(){
  return IDEAS.filter(i=>{
    const matchCat = currentFilter==='all' || i.cat===currentFilter;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || i.title.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q) || i.cat.includes(q) || i.tech.join(' ').toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

function render(){
  const grid = document.getElementById('grid');
  const visible = getVisible();
  document.getElementById('visible-count').textContent = visible.length;
  grid.innerHTML = '';
  if(!visible.length){
    grid.innerHTML = `<div class="no-results"><div class="no-results-big">404</div><div class="no-results-sub">No ideas match your query. Try a different filter or search term.</div></div>`;
    return;
  }
  visible.forEach((idea,idx)=>{
    const c = document.createElement('div');
    c.className='card';
    c.style.animationDelay=`${Math.min(idx*0.03,0.6)}s`;
    c.innerHTML=`
      <div class="card-head">
        <span class="card-num">${String(idea.id).padStart(2,'0')}</span>
        <span class="card-tag ${tagClass[idea.cat]}">${idea.cat}</span>
      </div>
      <div class="card-title">${idea.title}</div>
      <div class="card-desc">${idea.desc}</div>
      <div class="card-footer">
        <span class="card-price">${idea.price}</span>
        <span class="card-effort">⚡ ${idea.effort}</span>
      </div>`;
    c.addEventListener('click',()=>openModal(idea));
    grid.appendChild(c);
  });
}

function openModal(idea){
  document.getElementById('m-num').textContent=String(idea.id).padStart(2,'0');
  document.getElementById('m-tag').innerHTML=`<span class="card-tag ${tagClass[idea.cat]}">${idea.cat}</span>`;
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-title">${idea.title}</div>
    <div class="modal-desc">${idea.desc}</div>
    <div class="modal-grid">
      <div class="modal-kv"><div class="modal-kv-l">Price / Monetize</div><div class="modal-kv-v red">${idea.price}</div></div>
      <div class="modal-kv"><div class="modal-kv-l">Build Time</div><div class="modal-kv-v">${idea.effort}</div></div>
      <div class="modal-kv"><div class="modal-kv-l">Target User</div><div class="modal-kv-v blue">${idea.audience}</div></div>
      <div class="modal-kv"><div class="modal-kv-l">Revenue Model</div><div class="modal-kv-v green">${idea.revenue}</div></div>
    </div>
    <div class="modal-section-title">The Pain Point</div>
    <div class="pain-box">"${idea.pain}"</div>
    <div class="modal-section-title">Key Features</div>
    <ul class="feature-list">${idea.features.map(f=>`<li>${f}</li>`).join('')}</ul>
    <div class="modal-section-title">Tech Stack</div>
    <div class="tech-row">${idea.tech.map(t=>`<span class="tech-badge">${t}</span>`).join('')}</div>
  `;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('modal-close').addEventListener('click',closeModal);
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter=btn.dataset.f;
    render();
  });
});

document.getElementById('search').addEventListener('input',e=>{
  currentSearch=e.target.value;
  render();
});

render();
</script>
